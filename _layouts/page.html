<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v=5">
  <title>{{ page.title }} - {{ site.title }}</title>
  
  {% seo %}
</head>
<body>
  <div class="header">
    <h1><a href="{{ '/' | relative_url }}"><img src="{{ '/assets/profile.png' | relative_url }}" class="avatar" alt="{{ site.title }}">{{ site.title }}</a></h1>
    <div class="nav">
      <a href="{{ '/' | relative_url }}"{% if page.url == '/' %} class="active"{% endif %}>home</a>
    </div>
  </div>
  
  {% unless page.title == 'Blog' %}
  <h2>{{ page.title }}</h2>
  {% endunless %}
  
  <div class="content">
    {{ content }}
  </div>

</body>
</html>
